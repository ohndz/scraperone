name: Run psicologos scraper and upload CSV

on:
  workflow_dispatch: {}   # correr a mano
  schedule:
    - cron: "30 9 * * *"  # opcional: todos los días 09:30 UTC

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper (psicologos)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python main.py --scraper superpages_psicologos --format csv --limit 0

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-psicologos-csv
          path: output/*.csv